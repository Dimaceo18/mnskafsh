services:
  # Telegram бот (background worker — не требует порта)
  - type: worker
    name: minsk-afisha-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python channel_bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: CHANNEL_ID
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: MAX_POSTS_PER_HOUR
        value: "5"
      - key: MAX_POSTS_PER_DAY
        value: "20"
      - key: MORNING_DIGEST_TIME
        value: "09:00"
      - key: PUBLISH_INTERVAL_HOURS
        value: "4"

  # Парсер (Cron Job)
  - type: cron
    name: minsk-afisha-parser
    runtime: python
    schedule: "0 */4 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "import asyncio; from channel_bot import run_parser_and_publish; asyncio.run(run_parser_and_publish())"
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: CHANNEL_ID
        sync: false
      - key: ADMIN_ID
        sync: false

  # Утренний дайджест (Cron Job)
  - type: cron
    name: minsk-afisha-digest
    runtime: python
    schedule: "0 9 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "import asyncio; from channel_bot import send_morning_digest; asyncio.run(send_morning_digest())"
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: CHANNEL_ID
        sync: false
